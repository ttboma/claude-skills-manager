# strongstrong2 — MacBook Air
# Snapshot: 2026-05-06
# Claude Code: 2.1.104

machine:
  hostname: strongstrong2
  type: MacBook Air
  os: macOS 26.3
  arch: arm64
  claude_code_version: 2.1.104

# ============================================================
# Marketplaces (plugin registries)
# Install: claude plugin marketplace add github:<repo>
# ============================================================
marketplaces:
  - name: claude-plugins-official
    source: github:anthropics/claude-plugins-official
  - name: anthropic-agent-skills
    source: github:anthropics/skills
  - name: obsidian-skills
    source: github:kepano/obsidian-skills
  - name: superpowers-dev
    source: github:obra/superpowers

# ============================================================
# Plugins (installed via claude plugin install)
# Install: claude plugin install <name>
# ============================================================
plugins:
  - name: superpowers@claude-plugins-official
    version: 5.1.0
    source: https://github.com/obra/superpowers
    skills:
      - brainstorming
      - dispatching-parallel-agents
      - executing-plans
      - finishing-a-development-branch
      - receiving-code-review
      - requesting-code-review
      - subagent-driven-development
      - systematic-debugging
      - test-driven-development
      - using-git-worktrees
      - using-superpowers
      - verification-before-completion
      - writing-plans
      - writing-skills
    deprecated_aliases:
      - brainstorm
      - execute-plan
      - write-plan

  - name: obsidian@obsidian-skills
    version: 1.0.1
    source: https://github.com/kepano/obsidian-skills
    skills:
      - defuddle
      - json-canvas
      - obsidian-bases
      - obsidian-cli
      - obsidian-markdown

  - name: clangd-lsp@claude-plugins-official
    version: 1.0.0
    source: https://github.com/anthropics/claude-plugins-official
    provides: LSP server for C/C++ intellisense (no skills)

