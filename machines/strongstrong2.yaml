# ============================================================
# Local directory skills (~/.claude/skills/, real dirs not symlinks)
# Source: anthropic-agent-skills marketplace (github:anthropics/skills)
# Install: claude plugin marketplace add github:anthropics/skills
# ============================================================
local_skills:
  source: https://github.com/anthropics/skills
  install_method: "claude plugin marketplace add github:anthropics/skills"
  document_skills:  # 4
    - docx
    - pdf
    - pptx
    - xlsx
  example_skills:  # 12
    - algorithmic-art
    - brand-guidelines
    - canvas-design
    - doc-coauthoring
    - frontend-design
    - internal-comms
    - mcp-builder
    - skill-creator
    - slack-gif-creator
    - theme-factory
    - web-artifacts-builder
    - webapp-testing

# ============================================================
# Manually installed skills (not from any marketplace/plugin)
# ============================================================
manual_skills:
  - name: notebooklm
    path: ~/.claude/skills/notebooklm
    description: Query Google NotebookLM notebooks from Claude Code
  - name: nano-banana
    path: ~/.claude/skills/nano-banana
    description: Image generation via Nano Banana (Gemini CLI)

# ============================================================
# Built-in skills (part of Claude Code itself, not installable)
# ============================================================
builtin_skills:
  - claude-api
  - keybindings-help
  - loop
  - schedule
  - simplify
  - update-config
